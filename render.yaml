services:
  # ── Backend API (Web Service) ─────────────────────────────────
  - type: web
    name: portfolio-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────────
  - type: web
    name: portfolio-frontend
    runtime: static
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-backend-iw1y.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
